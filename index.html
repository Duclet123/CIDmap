<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CID Map | 2K25 Purple</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Base Styling */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; width: 100vw; height: 100vh; }

        /* Sidebar Styling */
        #sidebar {
            width: 300px; min-width: 300px; background-color: #000000; border-right: 1px solid #7D3DB7;
            display: flex; flex-direction: column; color: #7D3DB7; z-index: 10; overflow-y: auto;
            transition: margin-left 0.4s ease;
        }
        #sidebar.hidden { margin-left: -300px; }
        #gta-map { flex-grow: 1; height: 100%; background: #000000; z-index: 1; }

        /* Map Fixes */
        .leaflet-image-layer { object-fit: contain !important; image-rendering: -webkit-optimize-contrast; }

        /* Popups Styling */
        .popup-container { color: #fff; text-align: center; width: 220px; }
        .popup-img { 
            width: 100%; height: 120px; object-fit: cover; border-radius: 4px; 
            margin-bottom: 8px; border: 1px solid #7D3DB7; cursor: pointer; 
            transition: 0.2s; background: #000;
        }
        .popup-img:hover { filter: brightness(1.2); }
        .popup-title { font-size: 16px; font-weight: bold; color: #7D3DB7; margin-bottom: 6px; display: block; border-bottom: 1px solid #333; padding-bottom: 4px; }
        
        .popup-info-row { font-size: 12px; margin: 3px 0; display: flex; justify-content: space-between; gap: 10px; }
        .info-label { color: #888; font-weight: bold; white-space: nowrap; }
        .info-value { color: #ddd; text-align: right; }

        /* Lightbox */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center;
            cursor: pointer;
        }
        #lightbox img { max-width: 85%; max-height: 85%; border: 2px solid #7D3DB7; border-radius: 5px; box-shadow: 0 0 30px rgba(125, 61, 183, 0.5); }

        /* Admin Panel Styling - NO SCROLL & WIDER */
        .admin-popup-container { width: 310px; }
        .admin-section-title { color: #7D3DB7; font-size: 10px; font-weight: bold; margin-top: 8px; text-transform: uppercase; border-left: 2px solid #7D3DB7; padding-left: 5px; }
        .admin-code { 
            background: #111; border: 1px solid #333; padding: 8px; margin: 4px 0; 
            user-select: all; font-family: monospace; color: #ffffff; 
            font-size: 10px; border-radius: 4px; white-space: pre-wrap !important; 
            word-break: break-all !important; line-height: 1.3; display: block;
        }

        /* UI Elements */
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #7D3DB7; }
        #close-sidebar { background: #7D3DB7; border: 1px solid #7D3DB7; color: #000000; cursor: pointer; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        #open-sidebar { position: absolute; top: 20px; left: 20px; z-index: 9999; background: #7D3DB7; color: #000; border: none; cursor: pointer; padding: 12px 18px; border-radius: 4px; font-weight: bold; font-size: 20px; display: none; }
        #sidebar.hidden ~ #open-sidebar { display: block !important; }

        .category-header { background: #000000; padding: 12px 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .header-title { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 13px; color: #d1d1d1; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; margin-right: 5px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #7D3DB7; }
        input:checked + .slider:before { transform: translateX(16px); }

        .count-badge { background: #7D3DB7; color: #ffffff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .category-content { display: none; background: #0f0f0f; }
        .category-content.active { display: block; }
        .nav-item { padding: 12px 20px; font-size: 14px; color: #b0b0b0; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: #1a1a1a; color: #fff; border-left: 3px solid #7D3DB7; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        
        .leaflet-popup-content-wrapper { background: #000000 !important; color: #ffffff !important; border: 1px solid #7D3DB7; border-radius: 8px; }
        .leaflet-popup-tip { background: #7D3DB7 !important; }
        #sidebar-coords { margin-top: auto; padding: 15px; background: #161616; border-top: 1px solid #222; font-family: monospace; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'"><img src="" id="lightbox-img"></div>

    <div class="main-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>2k25 Purple</h2>
                <button id="close-sidebar" onclick="toggleSidebar()">❮</button>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="handleCategoryClick(event, 'criminal-menu')">
                    <div class="header-title">
                        <label class="switch"><input type="checkbox" id="check-gang" checked onclick="event.stopPropagation(); toggleLayer('check-gang', 'gang')"><span class="slider"></span></label>
                        CRIMINAL ORGANIZATIONS
                    </div>
                    <span id="gang-count" class="count-badge">0</span>
                </div>
                <div id="criminal-menu" class="category-content active"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="handleCategoryClick(event, 'service-menu')">
                    <div class="header-title">
                        <label class="switch"><input type="checkbox" id="check-police" checked onclick="event.stopPropagation(); toggleLayer('check-police', 'police')"><span class="slider"></span></label>
                        PUBLIC SERVICES
                    </div>
                    <span id="service-count" class="count-badge">0</span>
                </div>
                <div id="service-menu" class="category-content"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="handleCategoryClick(event, 'job-menu')">
                    <div class="header-title">
                        <label class="switch"><input type="checkbox" id="check-jobs" checked onclick="event.stopPropagation(); toggleLayer('check-jobs', 'job')"><span class="slider"></span></label>
                        CIVILIAN JOBS
                    </div>
                    <span id="job-count" class="count-badge">0</span>
                </div>
                <div id="job-menu" class="category-content"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="handleCategoryClick(event, 'asset-menu')">
                    <div class="header-title">
                        <label class="switch"><input type="checkbox" id="check-assets" checked onclick="event.stopPropagation(); toggleLayer('check-assets', 'asset')"><span class="slider"></span></label>
                        CRIMINAL ASSETS
                    </div>
                    <span id="asset-count" class="count-badge">0</span>
                </div>
                <div id="asset-menu" class="category-content"></div>
            </div>
            
            <div id="sidebar-coords">📍 X: <span id="coord-x">0</span> | Y: <span id="coord-y">0</span></div>
        </div>

        <button id="open-sidebar" onclick="toggleSidebar()">❯</button>
        <div id="gta-map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map, policeGroup, gangGroup, assetGroup, jobGroup;
        const bounds = [[-3500, -3000], [5000, 4500]];
        const imgFolder = "images/";
        const iconFolder = "icons/";

        const createIcon = (name, size = 28) => L.icon({
            iconUrl: `${iconFolder}${name}.jpg`,
            iconSize: [size, size],
            iconAnchor: [size/2, size/2]
        });

        function openImage(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function createInteractivePopup(data) {
            let imgHtml = data.img ? `<img src="${imgFolder}${data.img}" class="popup-img" onclick="openImage(this.src)">` : '';
            let typeHtml = data.type ? `<div class="popup-info-row"><span class="info-label">Type:</span><span class="info-value">${data.type}</span></div>` : '';
            let addrHtml = data.address ? `<div class="popup-info-row"><span class="info-label">Address:</span><span class="info-value">${data.address}</span></div>` : '';
            return `<div class="popup-container">${imgHtml}<span class="popup-title">${data.name}</span>${typeHtml}${addrHtml}</div>`;
        }

        window.onload = function() {
            map = L.map('gta-map', { crs: L.CRS.Simple, minZoom: -2.5, maxZoom: 2, zoomSnap: 0.1, zoomControl: false });
            L.imageOverlay(`${iconFolder}map.jpg`, bounds).addTo(map);
            map.fitBounds(bounds);

            policeGroup = L.layerGroup().addTo(map);
            gangGroup = L.layerGroup().addTo(map);
            assetGroup = L.layerGroup().addTo(map);
            jobGroup = L.layerGroup().addTo(map);

            const icons = {
                police: createIcon('police'), hospital: createIcon('hospital'), doj: createIcon('doj'),
                city: createIcon('city'), food: createIcon('food'), mec: createIcon('mec', 35),
                bar: createIcon('bar'), pawn: createIcon('pawn'), tech: createIcon('tech'),
                gun: createIcon('gun'), pill: createIcon('pill'), weed: createIcon('weed'),
                tattoo: createIcon('tattoo'), strip: createIcon('strip'), skate: createIcon('skate'),
                pet: createIcon('pet'), tailor: createIcon('tailor'), smoke: createIcon('smoke')
            };

            const mapData = {
                gangs: [
                    
                ],
                services: [
                    { x: 710.50, y: -1161.50, name: "MRPD", type: "Police Station", address: "Mission Row", icon: icons.police, color: "#4facfe", img: "mrpd.jpg" }
                ],
                jobs: [
                    { x: 1368.00, y: 1729.00, name: "Marina Restaurant", type: "Food", address: "Sandy Shores", icon: icons.food, color: "#ffffff", img: "marina.jpg" },
                    { x: -421.50, y: -1315.75, name: "Vista", type: "Bar", address: "Vespucci Beach", icon: icons.bar, color: "#ffffff", img: "vista.jpg" },
                    { x: -484.00, y: -1111.75, name: "Pizza This", type: "Food", address: "Vespucci/Luna Park", icon: icons.food, color: "#ffffff", img: "pizzathis.jpg" },
                    { x: 513.45, y: -1346.34, name: "Vanilla Unicorn", type: "Strip Club", address: "Strawberry", icon: icons.strip, color: "#ffffff", img: "vanilla.jpg" },
                    { x: -240.50, y: -1429.75, name: "Back Side Skate Boards", type: "Skate Shop", address: "Bay City Avenue", icon: icons.skate, color: "#ffffff", img: "skates.jpg" },
                    { x: 779.98, y: 1096.16, name: "Animal Ark", type: "Petshop", address: "Route 68", icon: icons.pet, color: "#ffffff", img: "animal.jpg" },
                    { x: 876.50, y: -1150.75, name: "Darnell Bros", type: "Tailor", address: "Popular Str.", icon: icons.tailor, color: "#ffffff", img: "darnelbros.jpg" },
                    { x: 1467.50, y: 1717.00, name: "Ammunation Sandy", type: "Ammunation", address: "Algonquin Blvd", icon: icons.gun, color: "#ffffff", img: "ammusandy.jpg" },
                    { x: 244.50, y: 3103.75, name: "Ammunation Paleto", type: "Ammunation", address: "Great Ocean Hwy", icon: icons.gun, color: "#ffffff", img: "ammupaleto.jpg" },
                    { x: 218.25, y: 3082.00, name: "Horny's", type: "Food", address: "Great Ocean Hwy", icon: icons.food, color: "#ffffff", img: "hornys.jpg" },
                    { x: 1234.50, y: -1554.75, name: "Blazing Tattoo", type: "Tattoo Shop", address: "Innocence Blvd", icon: icons.tattoo, color: "#ffffff", img: "blazingtattoo.jpg" },
                    { x: 136.12, y: -393.72, name: "SmoKing", type: "Smokes Store", address: "Eclipse Blvd", icon: icons.smoke, color: "#ffffff", img: "smoking.jpg" },
                    { x: -251.25, y: -1412.00, name: "LD Organics", type: "Shop", address: "Bay City Ave", icon: icons.weed, color: "#ffffff", img: "ldorganics.jpg" },
                    { x: -56.50, y: -1226.75, name: "O'Deas", type: "Pharmacy", address: "S Rockford Drive", icon: icons.pill, color: "#ffffff", img: "odeas.jpg" },
                    { x: 495.50, y: -689.00, name: "Dollar Pills", type: "Pharmacy", address: "Hawick Avenue", icon: icons.pill, color: "#ffffff", img: "dollarpill.jpg" },
                    { x: 986.76, y: -1863.34, name: "Memory Lanes", type: "Food", address: "Orchavadille", icon: icons.food, color: "#ffffff", img: "memorylanes.jpg" },
                    { x: 1125.00, y: -1085.00, name: "Burgershot", type: "Food", address: "San Andreas Ave & El Rancho Blvd", icon: icons.food, color: "#ffffff", img: "burgershot.jpg" },
                    { x: 517.50, y: -1442.50, name: "Lucky Plucker", type: "Food", address: "Strawberry Ave", icon: icons.food, color: "#ffffff", img: "lucky.jpg" },
                    { x: -75.50, y: -1248.00, name: "Wigwam", type: "Food", address: "Palomino Ave", icon: icons.food, color: "#ffffff", img: "wigwam.jpg" },
                    { x: 647.29, y: -1064.27, name: "The Last Light Pub", type: "Bar", address: "San Andreas Ave", icon: icons.bar, color: "#ffffff", img: "lastlight.jpg" },
                    { x: -111.25, y: -2061.25, name: "Sightings Restaurant", type: "Food", address: "Los Santos International Airport", icon: icons.food, color: "#ffffff", img: "sightings.jpg" },
                    { x: 43.49, y: -1086.82, name: "Digital Den Little Seoul", type: "Tech Store", address: "Palomino Ave, Little Seoul", icon: icons.tech, color: "#ffffff", img: "digitalseoul.jpg" },
                    { x: 528.78, y: -415.20, name: "Digital Den Vinewood", type: "Tech Store", address: "Vinewood Blvd", icon: icons.tech, color: "#ffffff", img: "digitalvinewood.jpg" },
                    { x: -256.00, y: -680.50, name: "Nocturnal", type: "Food/Bar", address: "Dorset Drive & Boulevard Del Perro", icon: icons.bar, color: "#ffffff", img: "nocturnal.jpg" },
                    { x: -1432.73, y: -240.24, name: "Oasis", type: "Beach Bar", address: "Great Ocean Hwy, Pacific Bluffs", icon: icons.bar, color: "#ffffff", img: "oasis.jpg" },
                    { x: 667.00, y: -410.00, name: "The Palace", type: "Night Club", address: "Power Str.", icon: icons.strip, color: "#ffffff", img: "thepalace.jpg" },
                    { x: 1123.50, y: -767.00, name: "Pawnshop Mirror Park", type: "Pawnshop", address: "E Mirror Drive", icon: icons.pawn, color: "#ffffff", img: "pawnmirror.jpg" },
                    { x: -437.40, y: -804.54, name: "Pawnshop Del Perro", type: "Pawnshop", address: "Boulevard Del Perro", icon: icons.pawn, color: "#ffffff", img: "pawndelperro.jpg" },
                    { x: 1127.73, y: -1028.37, name: "Hayes", type: "Mechanic", address: "W Mirror Drive", icon: icons.mec, color: "#ffffff", img: "hayes.jpg" },
                    { x: -536.69, y: -1062.07, name: "Strokemasters", type: "Mechanic", address: "Magelan Avenue, Luna Park", icon: icons.mec, color: "#ffffff", img: "strokemaster.jpg" },
                    { x: 1014.00, y: -1969.25, name: "Helmut's", type: "Mechanic", address: "Orchavadille Avenue", icon: icons.mec, color: "#ffffff", img: "helmuts.jpg" },
                    { x: 491.50, y: 3392.00, name: "Harmony Garage", type: "Mechanic", address: "Great Ocean Hwy, Paleto", icon: icons.mec, color: "#ffffff", img: "harmony.jpg" },
                    { x: 1470.50, y: 1666.25, name: "Seaton Sand's", type: "Mechanic", address: "Zacunto Ave, Sandy Shores", icon: icons.mec, color: "#ffffff", img: "seaton.jpg" },
                    { x: 223.50, y: -634.50, name: "Los Santos Customs", type: "Mechanic", address: "Eastbourne Way & Carcer Way", icon: icons.mec, color: "#ffffff", img: "ls.jpg" },
                    { x: 765.95, y: -660.36, name: "Auto's", type: "Mechanic", address: "Elgin Avenue", icon: icons.mec, color: "#ffffff", img: "auto.jpg" }
                ],
                assets: []
            };

            mapData.gangs.forEach(g => {
                L.circle(gtaToMap(g.x, g.y), { color: g.color, fillColor: g.color, fillOpacity: 0.2, radius: g.radius }).addTo(gangGroup);
                L.circleMarker(gtaToMap(g.x, g.y), { radius: 4, color: '#fff', fillColor: g.color, fillOpacity: 1 }).bindPopup(createInteractivePopup(g)).addTo(gangGroup);
                addNavItem('criminal-menu', g);
            });
            mapData.services.forEach(s => { L.marker(gtaToMap(s.x, s.y), {icon: s.icon}).bindPopup(createInteractivePopup(s)).addTo(policeGroup); addNavItem('service-menu', s); });
            mapData.jobs.forEach(j => { L.marker(gtaToMap(j.x, j.y), {icon: j.icon}).bindPopup(createInteractivePopup(j)).addTo(jobGroup); addNavItem('job-menu', j); });
            mapData.assets.forEach(a => { L.marker(gtaToMap(a.x, a.y)).bindPopup(createInteractivePopup(a)).addTo(assetGroup); addNavItem('asset-menu', a); });

            updateCounts(mapData);

            map.on('mousemove', (e) => { document.getElementById('coord-x').innerText = e.latlng.lng.toFixed(0); document.getElementById('coord-y').innerText = e.latlng.lat.toFixed(0); });

            map.on('contextmenu', (e) => {
                const x = e.latlng.lng.toFixed(2), y = e.latlng.lat.toFixed(2);
                L.popup().setLatLng(e.latlng).setContent(`
                    <div class="admin-popup-container">
                        <strong style="color:#7D3DB7; font-size:14px; display:block; margin-bottom:8px;">🛠️ ADMIN PANEL</strong>
                        <div class="admin-section-title">Current Coordinates</div>
                        <div class="admin-code">x: ${x}, y: ${y}</div>
                        <div class="admin-section-title">Gang</div>
                        <div class="admin-code">{x:${x}, y:${y}, name:"Name", type:"Gang", address:"Addr", color:"#fff", radius:100, img:"x.jpg"},</div>
                        <div class="admin-section-title">Service / Job</div>
                        <div class="admin-code">{x:${x}, y:${y}, name:"Name", type:"Type", address:"Addr", icon:icons.x, color:"#fff", img:"x.jpg"},</div>
                        <div class="admin-section-title">Asset</div>
                        <div class="admin-code">{x:${x}, y:${y}, name:"Name", type:"Asset", address:"Addr", color:"#fff", img:"x.jpg"},</div>
                    </div>
                `).openOn(map);
            });
        };

        const gtaToMap = (x, y) => [y, x];
        function handleCategoryClick(e, id) { if (e.target.tagName !== 'INPUT' && !e.target.classList.contains('slider')) toggleMenu(id); }
        function toggleMenu(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); setTimeout(() => { if(map) { map.invalidateSize(); map.fitBounds(bounds); } }, 400); }
        function goToLoc(x, y) { if(map) map.flyTo(gtaToMap(x, y), 1); }
        function updateCounts(data) {
            document.getElementById('gang-count').innerText = data.gangs.length;
            document.getElementById('service-count').innerText = data.services.length;
            document.getElementById('job-count').innerText = data.jobs.length;
            document.getElementById('asset-count').innerText = data.assets.length;
        }
        function toggleLayer(id, type) {
            const groups = { gang: gangGroup, police: policeGroup, job: jobGroup, asset: assetGroup };
            document.getElementById(id).checked ? map.addLayer(groups[type]) : map.removeLayer(groups[type]);
        }
        function addNavItem(id, data) {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.innerHTML = `<span class="dot" style="background:${data.color}; box-shadow:0 0 8px ${data.color}"></span> ${data.name}`;
            item.onclick = () => goToLoc(data.x, data.y);
            document.getElementById(id).appendChild(item);
        }
    </script>
</body>
</html>
