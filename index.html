<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CID Map | Infinity</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Base Styling */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; width: 100vw; height: 100vh; }

        /* Sidebar Styling */
        #sidebar {
            width: 300px; min-width: 300px; background-color: #000000; border-right: 1px solid #a1035a;
            display: flex; flex-direction: column; color: #a1035a; z-index: 10; overflow-y: auto;
            transition: margin-left 0.4s ease;
        }
        #sidebar.hidden { margin-left: -300px; }
        #gta-map { flex-grow: 1; height: 100%; background: #000000; z-index: 1; }

        /* Map Fixes */
        .leaflet-image-layer { object-fit: contain !important; image-rendering: -webkit-optimize-contrast; }

        /* Popups Styling */
        .popup-container { color: #fff; text-align: center; width: 220px; }
        .popup-img { 
            width: 100%; height: 120px; object-fit: cover; border-radius: 4px; 
            margin-bottom: 8px; border: 1px solid #a1035a; cursor: pointer; 
            transition: 0.2s; background: #000;
        }
        .popup-img:hover { filter: brightness(1.2); }
        .popup-title { font-size: 16px; font-weight: bold; color: #a1035a; margin-bottom: 6px; display: block; border-bottom: 1px solid #333; padding-bottom: 4px; }
        
        .popup-info-row { font-size: 12px; margin: 3px 0; display: flex; justify-content: space-between; gap: 10px; }
        .info-label { color: #888; font-weight: bold; white-space: nowrap; }
        .info-value { color: #ddd; text-align: right; }

        /* Lightbox (Full Screen Image) */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center;
            cursor: pointer;
        }
        #lightbox img { max-width: 85%; max-height: 85%; border: 2px solid #a1035a; border-radius: 5px; box-shadow: 0 0 30px rgba(161, 3, 90, 0.5); }

        /* Admin Panel Styling */
        .admin-popup-container { width: 330px; max-height: 450px; overflow-y: auto; padding-right: 5px; }
        .admin-popup-container::-webkit-scrollbar { width: 4px; }
        .admin-popup-container::-webkit-scrollbar-thumb { background: #a1035a; border-radius: 10px; }
        .admin-code { 
            background: #111; border: 1px solid #333; padding: 10px; margin: 5px 0; 
            user-select: all; font-family: 'Courier New', monospace; color: #ffffff; 
            font-size: 11px; border-radius: 4px; white-space: pre-wrap !important; 
            word-break: break-all !important; line-height: 1.4; display: block;
        }

        /* UI Elements */
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #a1035a; }
        #close-sidebar { background: #000000; border: 1px solid #a1035a; color: #a1035a; cursor: pointer; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        #open-sidebar { 
            position: absolute; top: 20px; left: 20px; z-index: 9999; 
            background: #a1035a; color: #000; border: none; cursor: pointer; 
            padding: 12px 18px; border-radius: 4px; font-weight: bold; font-size: 20px;
            box-shadow: 0 0 20px rgba(161, 3, 90, 0.6); display: none; 
        }
        #sidebar.hidden ~ #open-sidebar { display: block !important; }

        /* Category Menu */
        .category-header { background: #000000; padding: 12px 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .header-title { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 13px; color: #d1d1d1; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; margin-right: 5px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #a1035a; }
        input:checked + .slider:before { transform: translateX(16px); }

        .count-badge { background: #a1035a; color: #FFFFFF; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .category-content { display: none; background: #000000; }
        .category-content.active { display: block; }
        .nav-item { padding: 12px 20px; font-size: 14px; color: #ffffff; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: #000000; color: #fff; border-left: 3px solid #a1035a; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        
        .leaflet-popup-content-wrapper { background: #000000 !important; color: #ffffff !important; border: 1px solid #a1035a; border-radius: 8px; }
        .leaflet-popup-tip { background: #a1035a !important; }
        #sidebar-coords { margin-top: auto; padding: 15px; background: #000000; border-top: 1px solid #222; font-family: monospace; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'"><img src="" id="lightbox-img"></div>

    <div class="main-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>♾️ INFINITY</h2>
                <button id="close-sidebar" onclick="toggleSidebar()">❮</button>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="handleCategoryClick(event, 'criminal-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-gang" checked onclick="event.stopPropagation(); toggleLayer('check-gang', 'gang')">
                            <span class="slider"></span>
                        </label>
                        CRIMINAL GROUPS
                    </div>
                    <span id="gang-count" class="count-badge">0</span>
                </div>
                <div id="criminal-menu" class="category-content active"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="handleCategoryClick(event, 'service-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-police" checked onclick="event.stopPropagation(); toggleLayer('check-police', 'police')">
                            <span class="slider"></span>
                        </label>
                        PUBLIC SERVICES
                    </div>
                    <span id="service-count" class="count-badge">0</span>
                </div>
                <div id="service-menu" class="category-content"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="handleCategoryClick(event, 'job-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-jobs" checked onclick="event.stopPropagation(); toggleLayer('check-jobs', 'job')">
                            <span class="slider"></span>
                        </label>
                        CIVILIAN JOBS
                    </div>
                    <span id="job-count" class="count-badge">0</span>
                </div>
                <div id="job-menu" class="category-content"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="handleCategoryClick(event, 'asset-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-assets" checked onclick="event.stopPropagation(); toggleLayer('check-assets', 'asset')">
                            <span class="slider"></span>
                        </label>
                        CRIMINAL ASSETS
                    </div>
                    <span id="asset-count" class="count-badge">0</span>
                </div>
                <div id="asset-menu" class="category-content"></div>
            </div>
            
            <div id="sidebar-coords">📍 X: <span id="coord-x">0</span> | Y: <span id="coord-y">0</span></div>
        </div>

        <button id="open-sidebar" onclick="toggleSidebar()">❯</button>
        <div id="gta-map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map, policeGroup, gangGroup, assetGroup, jobGroup;
        const bounds = [[-3500, -3000], [5000, 4500]];
        const imgFolder = "images/";
        const iconFolder = "icons/";

        // Icons Definition
        const createIcon = (name, size = 28) => L.icon({
            iconUrl: `${iconFolder}${name}.jpg`,
            iconSize: [size, size],
            iconAnchor: [size/2, size/2]
        });

        // Lightbox Function
        function openImage(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function createInteractivePopup(data) {
            let imgHtml = data.img ? `<img src="${imgFolder}${data.img}" class="popup-img" onclick="openImage(this.src)" title="Click for fullscreen">` : '';
            let typeHtml = data.type ? `<div class="popup-info-row"><span class="info-label">Type:</span><span class="info-value">${data.type}</span></div>` : '';
            let addrHtml = data.address ? `<div class="popup-info-row"><span class="info-label">Address:</span><span class="info-value">${data.address}</span></div>` : '';
            
            return `
                <div class="popup-container">
                    ${imgHtml}
                    <span class="popup-title">${data.name}</span>
                    ${typeHtml}
                    ${addrHtml}
                </div>
            `;
        }

        window.onload = function() {
            map = L.map('gta-map', { crs: L.CRS.Simple, minZoom: -2.5, maxZoom: 2, zoomSnap: 0.1, zoomControl: false });
            L.imageOverlay(`${iconFolder}map.jpg`, bounds).addTo(map);
            map.fitBounds(bounds);

            // Groups Initialization
            policeGroup = L.layerGroup().addTo(map);
            gangGroup = L.layerGroup().addTo(map);
            assetGroup = L.layerGroup().addTo(map);
            jobGroup = L.layerGroup().addTo(map);

            const icons = {
                police: createIcon('police'),
                hospital: createIcon('hospital'),
                doj: createIcon('doj'),
                city: createIcon('city'),
                food: createIcon('food'),
                mec: createIcon('mec', 35)
            };

            const mapData = {
                gangs: [
                    { x: 1265.72, y: -909.34, name: "RTM", type: "Criminal Group", address: "Mirror Park", color: "#0F8ABD", radius: 100, img: "rtm.jpg" },
                    { x: -353.16, y: -395.60, name: "Team Locos", type: "Criminal Group", address: "Richman Hotel", color: "#ffffff", radius: 100, img: "locos.jpg" },
                    { x: 642.75, y: -1320.00, name: "MOB", type: "Criminal Group", address: "...", color: "#4002AD", radius: 100 },
                    { x: 962.52, y: -1975.40, name: "Ultimate Outlaws", type: "Criminal Group", address: "...", color: "#EDFF00", radius: 100 },
                    { x: -94.22, y: -1332.91, name: "VTS", type: "Criminal Group", address: "...", color: "#696969", radius: 100 },
                    { x: 1017.17, y: -683.77, name: "WSR", type: "Criminal Group", address: "...", color: "#FF7AED", radius: 100 }
                ],
                services: [
                    { x: 937.27, y: -1345.27, name: "La Mesa PD", type: "Police Station", address: "Popular St.", icon: icons.police, color: "#4facfe" },
                    { x: 1136.32, y: -1460.88, name: "EMS", type: "Medical Center", address: "Strawberry Ave", icon: icons.hospital, color: "#ff4b4b" },
                    { x: 578.32, y: -813.88, name: "DoJ", type: "Justice Dept", address: "San Andreas Ave", icon: icons.doj, color: "#ffffff" },
                    { x: 111.11, y: -683.29, name: "City Hall", type: "Public Service", address: "Alta", icon: icons.city, color: "#ffffff" }
                ],
                jobs: [
                    { x: -521.50, y: -1069.50, name: "Strokemasters", type: "Mechanic", address: "La Puerta", icon: icons.mec, color: "#ffffff", img: "mechanic.jpg" },
                    { x: 453.06, y: -684.11, name: "Burgershot", type: "Restaurant", address: "Vespucci Canals", icon: icons.food, color: "#ffffff", img: "burgershot.jpg" },
                    { x: 441.50, y: -1528.50, name: "Tacos", type: "Fast Food", address: "Rancho", icon: icons.food, color: "#ffffff", img: "tacos.jpg" }
                ],
                assets: [
                    { x: 469.87, y: 3383.51, name: "High Pistols Craft", type: "Illegal Craft", address: "Paleto Bay", color: "#ffffff" },
                    { x: 2150.36, y: 2125.67, name: "Medium Pistol Craft", type: "Illegal Craft", address: "Grapeseed", color: "#ffffff" },
                    { x: 880.44, y: -1382.84, name: "Low Pistols Craft", type: "Illegal Craft", address: "La Mesa", color: "#ffffff" },
                    { x: 1357.00, y: 3259.50, name: "Boosting", type: "Illegal Activity", address: "Mount Chiliad", color: "#ffffff" },
                    { x: 2004.00, y: 1125.00, name: "High SMG Craft", type: "Illegal Craft", address: "Grapeseed", color: "#ffffff" },
                    { x: 416.82, y: -2098.13, name: "Low SMG Craft", type: "Illegal Craft", address: "Davis", color: "#ffffff" },
                    { x: -622.75, y: -2320.00, name: "House Robberies", type: "Illegal Activity", address: "Elysian Island", color: "#ffffff" },
                    { x: 727.13, y: -1878.70, name: "Weed Run", type: "Illegal Activity", address: "Rancho", color: "#ffffff" },
                    { x: 95.50, y: -1565.00, name: "Chop", type: "Illegal Activity", address: "Strawberry", color: "#ffffff" },
                    { x: 523.84, y: -1286.52, name: "Roof Robberies", type: "Illegal Activity", address: "Downtown", color: "#ffffff" }
                ]
            };

            // Data Rendering
            mapData.gangs.forEach(g => {
                L.circle(gtaToMap(g.x, g.y), { color: g.color, fillColor: g.color, fillOpacity: 0.2, radius: g.radius }).addTo(gangGroup);
                L.circleMarker(gtaToMap(g.x, g.y), { radius: 4, color: '#fff', fillColor: g.color, fillOpacity: 1 }).bindPopup(createInteractivePopup(g)).addTo(gangGroup);
                addNavItem('criminal-menu', g);
            });
            mapData.services.forEach(s => { L.marker(gtaToMap(s.x, s.y), {icon: s.icon}).bindPopup(createInteractivePopup(s)).addTo(policeGroup); addNavItem('service-menu', s); });
            mapData.jobs.forEach(j => { L.marker(gtaToMap(j.x, j.y), {icon: j.icon}).bindPopup(createInteractivePopup(j)).addTo(jobGroup); addNavItem('job-menu', j); });
            mapData.assets.forEach(a => { L.marker(gtaToMap(a.x, a.y)).bindPopup(createInteractivePopup(a)).addTo(assetGroup); addNavItem('asset-menu', a); });

            updateCounts(mapData);

            map.on('mousemove', (e) => { document.getElementById('coord-x').innerText = e.latlng.lng.toFixed(0); document.getElementById('coord-y').innerText = e.latlng.lat.toFixed(0); });

            map.on('contextmenu', (e) => {
                const x = e.latlng.lng.toFixed(2), y = e.latlng.lat.toFixed(2);
                L.popup().setLatLng(e.latlng).setContent(`
                    <div class="admin-popup-container">
                        <strong style="color:#a1035a; font-size:16px;">🛠️ ADMIN PANEL</strong><br>
                        <div style="margin-top:10px; font-size:11px; color:#ddd;">COORDS:</div>
                        <div class="admin-code">x: ${x}, y: ${y}</div>
                        <div style="margin-top:10px; font-size:11px; color:#ddd;">SNIPPET:</div>
                        <div class="admin-code">{ x: ${x}, y: ${y}, name: "Name", type: "Type", address: "Addr", color: "#ffffff", img: "photo.jpg" },</div>
                    </div>
                `).openOn(map);
            });
        };

        // Utility Functions
        const gtaToMap = (x, y) => [y, x];
        function handleCategoryClick(e, id) { if (e.target.tagName !== 'INPUT' && !e.target.classList.contains('slider')) toggleMenu(id); }
        function toggleMenu(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); setTimeout(() => { if(map) { map.invalidateSize(); map.fitBounds(bounds); } }, 400); }
        function goToLoc(x, y) { if(map) map.flyTo(gtaToMap(x, y), 1); }
        function updateCounts(data) {
            document.getElementById('gang-count').innerText = data.gangs.length;
            document.getElementById('service-count').innerText = data.services.length;
            document.getElementById('job-count').innerText = data.jobs.length;
            document.getElementById('asset-count').innerText = data.assets.length;
        }
        function toggleLayer(id, type) {
            const groups = { gang: gangGroup, police: policeGroup, job: jobGroup, asset: assetGroup };
            document.getElementById(id).checked ? map.addLayer(groups[type]) : map.removeLayer(groups[type]);
        }
        function addNavItem(id, data) {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.innerHTML = `<span class="dot" style="background:${data.color}; box-shadow:0 0 8px ${data.color}"></span> ${data.name}`;
            item.onclick = () => goToLoc(data.x, data.y);
            document.getElementById(id).appendChild(item);
        }
    </script>
</body>
</html>
