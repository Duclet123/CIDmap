<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CID Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0c0c0c; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; width: 100vw; height: 100vh; }

        #sidebar {
            width: 300px; min-width: 300px; background-color: #0f0f0f; border-right: 1px solid #2a1a0a;
            display: flex; flex-direction: column; color: #fff; z-index: 10; overflow-y: auto;
            transition: margin-left 0.4s ease;
        }

        #sidebar.hidden { margin-left: -300px; }
        #gta-map { flex-grow: 1; height: 100%; background: #0c0c0c; }

        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #a1035a; }
        .sidebar-header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; }

        #close-sidebar { background: #161616; border: 1px solid #a1035a; color: #a1035a; cursor: pointer; padding: 5px 10px; border-radius: 4px; font-weight: bold; }

        #open-sidebar { 
            position: absolute; top: 20px; left: 20px; z-index: 9999; 
            background: #a1035a; color: #000; border: none; cursor: pointer; 
            padding: 12px 18px; border-radius: 4px; font-weight: bold; font-size: 20px;
            box-shadow: 0 0 20px rgba(161, 3, 90, 0.6); display: none; 
        }

        #sidebar.hidden ~ #open-sidebar { display: block !important; }

        .category-header { background: #161616; padding: 12px 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .header-title { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 13px; color: #d1d1d1; }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #a1035a; }
        input:checked + .slider:before { transform: translateX(16px); }

        .count-badge { background: #331a00; color: #a1035a; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .category-content { display: none; background: #0f0f0f; }
        .category-content.active { display: block; }

        .nav-item { padding: 12px 20px; font-size: 14px; color: #b0b0b0; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: #1a1a1a; color: #fff; border-left: 3px solid #a1035a; }

        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        #sidebar-coords { margin-top: auto; padding: 15px; background: #161616; border-top: 1px solid #222; font-family: monospace; color: #888; font-size: 12px; }
        
        /* ADMIN POPUP - UPDATED COLORS AND FONT SIZE */
        .leaflet-popup-content-wrapper { background: #000000 !important; color: #ffffff !important; border: 1px solid #a1035a; border-radius: 8px; width: 380px; }
        .leaflet-popup-content { margin: 15px; width: auto !important; }
        .leaflet-popup-tip { background: #a1035a !important; }
        
        .admin-code { 
            background: #111; 
            border: 1px solid #333; 
            padding: 10px; 
            margin-top: 5px; 
            user-select: all; 
            font-family: 'Courier New', monospace; 
            color: #ffffff; /* Αλλαγή σε άσπρο */
            font-size: 14px; /* Μεγαλύτερα γράμματα */
            border-radius: 4px;
            white-space: pre-wrap; 
            word-break: break-all;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>♾️ INFINITY</h2>
                <button id="close-sidebar" onclick="toggleSidebar()">❮</button>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="toggleMenu('criminal-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-gang" checked onclick="event.stopPropagation(); toggleLayer('check-gang', gangGroup)">
                            <span class="slider"></span>
                        </label>
                        CRIMINAL GROUPS
                    </div>
                    <span id="gang-count" class="count-badge">0</span>
                </div>
                <div id="criminal-menu" class="category-content active"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="toggleMenu('service-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-police" checked onclick="event.stopPropagation(); toggleLayer('check-police', policeGroup)">
                            <span class="slider"></span>
                        </label>
                        PUBLIC SERVICES
                    </div>
                    <span id="service-count" class="count-badge">0</span>
                </div>
                <div id="service-menu" class="category-content"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="toggleMenu('job-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-jobs" checked onclick="event.stopPropagation(); toggleLayer('check-jobs', jobGroup)">
                            <span class="slider"></span>
                        </label>
                        CIVILIAN JOBS
                    </div>
                    <span id="job-count" class="count-badge">0</span>
                </div>
                <div id="job-menu" class="category-content"></div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="toggleMenu('asset-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-assets" checked onclick="event.stopPropagation(); toggleLayer('check-assets', assetGroup)">
                            <span class="slider"></span>
                        </label>
                        CRIMINAL ASSETS
                    </div>
                    <span id="asset-count" class="count-badge">0</span>
                </div>
                <div id="asset-menu" class="category-content"></div>
            </div>
            
            <div id="sidebar-coords">📍 X: <span id="coord-x">0</span> | Y: <span id="coord-y">0</span></div>
        </div>

        <button id="open-sidebar" onclick="toggleSidebar()">❯</button>
        <div id="gta-map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('gta-map', { crs: L.CRS.Simple, minZoom: -1.5, maxZoom: 2, zoomControl: false });
        var bounds = [[-3500, -3000], [5000, 4500]];
        L.imageOverlay('icons/map.jpg', bounds).addTo(map); 
        map.fitBounds(bounds);

        var policeGroup = L.layerGroup().addTo(map);
        var gangGroup = L.layerGroup().addTo(map);
        var assetGroup = L.layerGroup().addTo(map);
        var jobGroup = L.layerGroup().addTo(map);

        var policeIcon = L.icon({ iconUrl: 'icons/police.jpg', iconSize: [28, 28], iconAnchor: [14, 14] });
        var hospitalIcon = L.icon({ iconUrl: 'icons/hospital.jpg', iconSize: [28, 28], iconAnchor: [14, 14] });

        // --- DATA ---
        const mapData = {
            gangs: [
                { x: 1259.50, y: -1130.25, name: "RTM", color: "#0F8ABD", desc: "Mirror Park", radius: 100 },
		{ x: -352.50, y: -530.50, name: "Team Locos", color: "#ffffff", desc: "Richman Hotel", radius: 100 },
		{ x: 640.25, y: -1593.00, name: "MOB", color: "#4002AD", desc: "...", radius: 100 },
		{ x: 955.00, y: -2350.50, name: "Ultimate Outlaws", color: "#EDFF00", desc: "...", radius: 100 },
		{ x: -100.50, y: -1614.25, name: "VTS", color: "#696969", desc: "...", radius: 100 },
		{ x: 1015.75, y: -876.00, name: "WSR", color: "#FF7AED", desc: "...", radius: 100 },
            ],
            services: [
                { x: 938.00, y: -1625.5, name: "La Mesa PD", icon: policeIcon, color: "#4facfe" },
                { x: 1125, y: -1772, name: "EMS", icon: hospitalIcon, color: "#ff4b4b" }
            ],
            jobs: [
                { x: -550, y: -190, name: "Taxi Driver", color: "#ffcc00" },
                { x: 450, y: -600, name: "Mechanic", color: "#aaaaaa" }
            ],
            assets: [
        { x: 876.00, y: -1679.00, name: "Low Pistols Craft", color: "#ffffff" },
		{ x: 2152.75, y: 2303.75, name: "Medium Pistol Craft", color: "#ffffff" },
		{ x: 470.00, y: 3740.50, name: "High Pistols Craft", color: "#ffffff" },
		{ x: 1355.75, y: 3594.75, name: "Boosting", color: "#ffffff" },
		{ x: 2004.75, y: 1155.00, name: "High SMG Craft", color: "#ffffff" },
		{ x: 415.50, y: -2475.50, name: "Low SMG Craft", color: "#ffffff" },
		{ x: -601.00, y: -2736.50, name: "House Robberies", color: "#ffffff" },
		{ x: 737.50, y: -2217.00, name: "Weed Run", color: "#ffffff" },
		{ x: 97.50, y: -1877.25, name: "Chop", color: "#ffffff" },
		{ x: 529.75, y: -1558.50, name: "Roof Robberies", color: "#ffffff" },
				
            ]
        };

        function gtaToMap(x, y) { return [y, x]; }
        function toggleMenu(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); setTimeout(() => { map.invalidateSize(); }, 400); }
        function goToLoc(x, y) { map.flyTo(gtaToMap(x, y), 1); }
        function toggleLayer(checkboxId, group) { document.getElementById(checkboxId).checked ? map.addLayer(group) : map.removeLayer(group); }

        function initMap() {
            // Gangs
            mapData.gangs.forEach(gang => {
                L.circle(gtaToMap(gang.x, gang.y), { color: gang.color, fillColor: gang.color, fillOpacity: 0.2, radius: gang.radius }).addTo(gangGroup);
                L.circleMarker(gtaToMap(gang.x, gang.y), { radius: 4, color: '#fff', fillColor: gang.color, fillOpacity: 1 }).bindPopup(`<b>${gang.name}</b>`).addTo(gangGroup);
                addNavItem('criminal-menu', gang);
            });
            // Services
            mapData.services.forEach(svc => {
                L.marker(gtaToMap(svc.x, svc.y), {icon: svc.icon}).bindPopup(`<b>${svc.name}</b>`).addTo(policeGroup);
                addNavItem('service-menu', svc);
            });
            // Jobs
            mapData.jobs.forEach(job => {
                L.circleMarker(gtaToMap(job.x, job.y), { radius: 6, color: '#fff', fillColor: job.color, fillOpacity: 1 }).bindPopup(`<b>${job.name}</b>`).addTo(jobGroup);
                addNavItem('job-menu', job);
            });
            // Assets
            mapData.assets.forEach(asset => {
                L.marker(gtaToMap(asset.x, asset.y)).bindPopup(`<b>${asset.name}</b>`).addTo(assetGroup);
                addNavItem('asset-menu', asset);
            });

            document.getElementById('gang-count').innerText = mapData.gangs.length;
            document.getElementById('service-count').innerText = mapData.services.length;
            document.getElementById('job-count').innerText = mapData.jobs.length;
            document.getElementById('asset-count').innerText = mapData.assets.length;
        }

        function addNavItem(menuId, data) {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.innerHTML = `<span class="dot" style="background:${data.color}; box-shadow:0 0 8px ${data.color}"></span> ${data.name}`;
            item.onclick = () => goToLoc(data.x, data.y);
            document.getElementById(menuId).appendChild(item);
        }

        initMap();

        map.on('mousemove', (e) => {
            document.getElementById('coord-x').innerText = e.latlng.lng.toFixed(0);
            document.getElementById('coord-y').innerText = e.latlng.lat.toFixed(0);
        });

        map.on('contextmenu', (e) => {
            var x = e.latlng.lng.toFixed(2), y = e.latlng.lat.toFixed(2);
            L.popup().setLatLng(e.latlng).setContent(`
                <div class="admin-popup">
                    <strong style="color:#a1035a; font-size:16px;">🛠️ ADMIN PANEL</strong><br>
                    <div style="margin-top:10px; font-size:12px; color:#ddd; font-weight:bold;">COORDS:</div>
                    <div class="admin-code">${x}, ${y}</div>
                    <div style="margin-top:10px; font-size:12px; color:#ddd; font-weight:bold;">GANG OBJECT:</div>
                    <div class="admin-code">{ x: ${x}, y: ${y}, name: "Name", color: "#ffffff", desc: "...", radius: 100 },</div>
                    <div style="margin-top:10px; font-size:12px; color:#ddd; font-weight:bold;">JOB/SERVICE/ASSET:</div>
                    <div class="admin-code">{ x: ${x}, y: ${y}, name: "Name", color: "#ffffff" },</div>
                </div>
            `).openOn(map);
        });
    </script>
</body>
</html>
