<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite RP Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0c0c0c; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; width: 100vw; height: 100vh; }

        #sidebar {
            width: 300px; min-width: 300px; background-color: #0f0f0f; border-right: 1px solid #2a1a0a;
            display: flex; flex-direction: column; color: #fff; z-index: 10; overflow-y: auto;
            transition: margin-left 0.4s ease;
        }

        #sidebar.hidden { margin-left: -300px; }

        #gta-map { flex-grow: 1; height: 100%; background: #0c0c0c; }

        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff6a00; }
        .sidebar-header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; }

        #close-sidebar, #open-sidebar {
            background: #161616; border: 1px solid #ff6a00; color: #ff6a00;
            cursor: pointer; padding: 5px 10px; border-radius: 4px; font-weight: bold;
        }

        #open-sidebar { position: absolute; top: 20px; left: 20px; z-index: 5; }

        .category-header { background: #161616; padding: 12px 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .header-title { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 13px; color: #d1d1d1; }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff6a00; }
        input:checked + .slider:before { transform: translateX(16px); }

        .count-badge { background: #331a00; color: #ff6a00; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .category-content { display: none; background: #0f0f0f; }
        .category-content.active { display: block; }

        .nav-item { padding: 12px 20px; font-size: 14px; color: #b0b0b0; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: #1a1a1a; color: #fff; border-left: 3px solid #ff6a00; }

        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot-purple { background: #a370ff; box-shadow: 0 0 8px #a370ff; }
        .dot-orange { background: #ff8c00; box-shadow: 0 0 8px #ff8c00; }
        .dot-green { background: #70ff70; box-shadow: 0 0 8px #70ff70; }
        .dot-blue { background: #4facfe; box-shadow: 0 0 8px #4facfe; }

        #sidebar-coords { margin-top: auto; padding: 15px; background: #161616; border-top: 1px solid #222; font-family: monospace; color: #888; font-size: 12px; }
        .admin-code { background: #000; border: 1px solid #444; padding: 5px; margin-top: 5px; user-select: all; font-family: monospace; color: #0f0; font-size: 10px;}
    </style>
</head>
<body>

    <div class="main-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>🌐 INFINITY</h2>
                <button id="close-sidebar" onclick="toggleSidebar()">❮</button>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="toggleMenu('criminal-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-gang" checked onclick="event.stopPropagation(); toggleLayer('check-gang', 'gangGroup')">
                            <span class="slider"></span>
                        </label>
                        CRIMINAL GROUPS
                    </div>
                    <span class="count-badge">3</span>
                </div>
                <div id="criminal-menu" class="category-content active">
                    <div class="nav-item" onclick="goToLoc(497, -2056)"><span class="dot dot-purple"></span> Ballas</div>
                    <div class="nav-item" onclick="goToLoc(416, -1736)"><span class="dot dot-green"></span> Families</div>
                    <div class="nav-item" onclick="goToLoc(635, -2120)"><span class="dot dot-orange"></span> Vagos</div>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-header" onclick="toggleMenu('service-menu')">
                    <div class="header-title">
                        <label class="switch">
                            <input type="checkbox" id="check-police" checked onclick="event.stopPropagation(); toggleLayer('check-police', 'policeGroup')">
                            <span class="slider"></span>
                        </label>
                        PUBLIC SERVICES
                    </div>
                    <span class="count-badge">2</span>
                </div>
                <div id="service-menu" class="category-content">
                    <div class="nav-item" onclick="goToLoc(705, -1419)"><span class="dot dot-blue"></span> Mission Row PD</div>
                    <div class="nav-item" onclick="goToLoc(1125, -1772)"><span class="dot dot-blue"></span> Pillbox EMS</div>
                </div>
            </div>
            
            <div id="sidebar-coords">
                📍 X: <span id="coord-x">0</span> | Y: <span id="coord-y">0</span>
            </div>
        </div>

        <button id="open-sidebar" onclick="toggleSidebar()">❯</button>
        <div id="gta-map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('gta-map', { crs: L.CRS.Simple, minZoom: -1.5, maxZoom: 2, zoomControl: false });
        var bounds = [[-3500, -3000], [5000, 4500]];
        
        // ΠΡΟΣΟΧΗ: Βεβαιώσου ότι η εικόνα είναι στο: icons/map.jpg
        L.imageOverlay('icons/map.jpg', bounds).addTo(map); 
        map.fitBounds(bounds);

        var policeGroup = L.layerGroup().addTo(map);
        var gangGroup = L.layerGroup().addTo(map);

        var policeIcon = L.icon({ iconUrl: 'icons/police.jpg', iconSize: [28, 28], iconAnchor: [14, 14] });
        var hospitalIcon = L.icon({ iconUrl: 'icons/hospital.jpg', iconSize: [28, 28], iconAnchor: [14, 14] });

        function gtaToMap(x, y) { return [y, x]; }

        function toggleMenu(id) { document.getElementById(id).classList.toggle('active'); }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
            setTimeout(() => { map.invalidateSize(); }, 400);
        }

        function goToLoc(x, y) { map.flyTo(gtaToMap(x, y), 1, { duration: 1.5 }); }

        function toggleLayer(checkboxId, groupName) {
            var cb = document.getElementById(checkboxId);
            var layerGroup = (groupName === 'policeGroup') ? policeGroup : gangGroup;
            cb.checked ? map.addLayer(layerGroup) : map.removeLayer(layerGroup);
        }

        function addGangZone(x, y, radius, color, name, desc) {
            L.circle(gtaToMap(x, y), { color: color, fillColor: color, fillOpacity: 0.2, radius: radius }).addTo(gangGroup);
            L.circleMarker(gtaToMap(x, y), { radius: 4, color: '#fff', fillColor: color, fillOpacity: 1 }).bindPopup(`<b>${name}</b><br>${desc}`).addTo(gangGroup);
        }

        addGangZone(497, -2056, 100, "#a370ff", "Ballas", "Grove St."); 
        addGangZone(416, -1736, 100, "#70ff70", "Families", "Forum Dr.");
        addGangZone(635, -2120, 100, "#ff8c00", "Vagos", "Rancho.");

        L.marker(gtaToMap(705.5, -1419.5), {icon: policeIcon}).bindPopup('Mission Row PD').addTo(policeGroup);
        L.marker(gtaToMap(1125, -1772), {icon: hospitalIcon}).bindPopup('Pillbox Hospital').addTo(policeGroup);

        map.on('mousemove', function(e) {
            document.getElementById('coord-x').innerText = e.latlng.lng.toFixed(0);
            document.getElementById('coord-y').innerText = e.latlng.lat.toFixed(0);
        });
    </script>
</body>
</html>
